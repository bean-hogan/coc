<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torn Groups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">TORN<span>GROUPS</span></a>
    <div class="header-meta" id="last-updated"></div>
  </div>
</header>

<main class="main">
  <div class="page-head">
    <h1 class="page-title">Collection drives</h1>
    <p class="page-sub">Live status · refreshes every 5 minutes</p>
  </div>

  <div class="stats-bar" id="stats-bar">
    <div class="stat"><span class="stat-val" id="stat-total">—</span><span class="stat-label">Total groups</span></div>
    <div class="stat"><span class="stat-val accent" id="stat-open">—</span><span class="stat-label">Open</span></div>
    <div class="stat"><span class="stat-val" id="stat-closed">—</span><span class="stat-label">Closed</span></div>
    <div class="stat"><span class="stat-val green" id="stat-members">—</span><span class="stat-label">Contributors</span></div>
  </div>

  <div id="loading" class="loading-state">Loading groups…</div>
  <div id="error" class="error-state" style="display:none"></div>

  <div class="groups-grid" id="groups-grid" style="display:none"></div>
</main>

<footer class="site-footer">
  Data sourced from Torn City · <a href="https://www.torn.com/profiles.php?XID=2966467" target="_blank" rel="noopener">Ben_Hagen [2966467]</a>
</footer>

<script src="config.js"></script>
<script src="api.js"></script>
<script>
(async () => {
  try {
    const data = await api.getGroups();
    const groups = data.groups || [];

    document.getElementById('stat-total').textContent   = groups.length;
    document.getElementById('stat-open').textContent    = groups.filter(g => g.status === 'open').length;
    document.getElementById('stat-closed').textContent  = groups.filter(g => g.status === 'closed').length;

    // Unique contributors across all groups
    const allContribs = groups.reduce((s, g) => s + (g.contributors || 0), 0);
    document.getElementById('stat-members').textContent = allContribs;

    const grid = document.getElementById('groups-grid');
    grid.innerHTML = groups.map(g => {
      const pct     = g.target > 0 ? Math.min(100, Math.round((g.totalReceived / g.target) * 100)) : 0;
      const closed  = g.status === 'closed';
      const dateStr = closed ? (g.endDate || '') : (g.startDate || '');
      const dateLabel = closed ? 'Closed ' + dateStr : 'Opened ' + dateStr;

      return `
      <a href="group.html?id=${g.id}" class="group-card ${closed ? 'is-closed' : 'is-open'}">
        <div class="card-top">
          <div>
            <div class="card-id">${g.id}</div>
            <div class="card-item">${g.itemName} · ${g.target} units</div>
          </div>
          <span class="badge ${closed ? 'badge-closed' : 'badge-open'}">${closed ? 'Closed' : 'Open'}</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-bg">
            <div class="progress-fill ${closed ? 'fill-closed' : 'fill-open'}" style="width:${pct}%"></div>
          </div>
          <div class="progress-labels">
            <span>${g.totalReceived} / ${g.target} received</span>
            <span>${pct}%</span>
          </div>
        </div>
        <div class="card-foot">
          <span>${g.contributors} contributor${g.contributors !== 1 ? 's' : ''}</span>
          <span class="card-date">${dateLabel}</span>
        </div>
      </a>`;
    }).join('');

    document.getElementById('loading').style.display = 'none';
    grid.style.display = 'grid';
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display   = 'block';
    document.getElementById('error').textContent     = 'Could not load data. Please try again later.';
  }
})();
</script>
</body>
</html>
